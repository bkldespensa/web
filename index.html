<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despensa BKL - Almacén</title>
    <!-- Tailwind CSS para el diseño moderno -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col justify-between">

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="max-w-md mx-auto w-full px-4 py-8 flex-grow flex flex-col justify-center items-center">
        
        <!-- LOGO / NOMBRE -->
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-amber-500/20">
                <i class="fa-solid fa-shop text-4xl text-gray-900"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight text-white mb-1">BKL</h1>
            <p class="text-amber-400 font-medium tracking-wide uppercase text-sm">Despensa & Almacén</p>
        </div>

        <!-- CARTEL DINÁMICO DE ESTADO (CONEXIÓN SUPABASE) -->
        <div id="status-card" class="w-full bg-gray-800 rounded-2xl p-6 mb-8 text-center border border-gray-700 shadow-xl transition-all duration-500 transform scale-95 opacity-50">
            <div class="inline-flex items-center justify-center space-x-2 mb-2">
                <span id="status-dot" class="w-3 h-3 rounded-full animate-pulse"></span>
                <span id="status-text" class="text-xl font-bold tracking-wide">Cargando estado...</span>
            </div>
            <p class="text-gray-400 text-xs mt-1">Actualizado en tiempo real</p>
        </div>

        <!-- INFORMACIÓN DEL NEGOCIO -->
        <div class="w-full bg-gray-800/50 backdrop-blur rounded-2xl p-6 border border-gray-700/50 space-y-6 shadow-lg mb-8">
            
            <!-- HORARIOS -->
            <div class="flex items-start space-x-4">
                <div class="bg-amber-500/10 p-3 rounded-xl border border-amber-500/20 text-amber-400">
                    <i class="fa-solid fa-clock text-xl w-6 text-center"></i>
                </div>
                <div>
                    <h3 class="text-gray-400 text-xs font-semibold uppercase tracking-wider">Nuestros Horarios</h3>
                    <p class="text-white font-medium mt-0.5">Lunes a Domingos</p>
                    <p class="text-amber-400 text-sm font-bold">9:00 hs a 23:00 hs <span class="bg-amber-500/20 text-amber-300 text-[11px] px-2 py-0.5 rounded-full ml-1 font-normal">Corrido</span></p>
                </div>
            </div>

            <!-- UBICACIÓN -->
            <div class="flex items-start space-x-4">
                <div class="bg-amber-500/10 p-3 rounded-xl border border-amber-500/20 text-amber-400">
                    <i class="fa-solid fa-location-dot text-xl w-6 text-center"></i>
                </div>
                <div>
                    <h3 class="text-gray-400 text-xs font-semibold uppercase tracking-wider">Dirección</h3>
                    <p class="text-white font-medium mt-0.5">La Paz 1607</p>
                    <p class="text-gray-400 text-sm">San Benito, Entre Ríos</p>
                </div>
            </div>

        </div>

        <!-- BOTÓN DE CONTACTO WHATSAPP -->
        <a href="https://wa.me/5493435443463" target="_blank" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] text-white font-bold py-4 px-6 rounded-2xl flex items-center justify-center space-x-3 shadow-lg shadow-emerald-900/30 transition-all text-lg">
            <i class="fa-brands fa-whatsapp text-2xl"></i>
            <span>Hacer un Pedido por WhatsApp</span>
        </a>

    </main>

    <!-- PIE DE PÁGINA -->
    <footer class="text-center py-6 text-xs text-gray-600 border-t border-gray-800/50 w-full">
        &copy; 2026 Despensa BKL. Todos los derechos reservados.
    </footer>

    <!-- LÓGICA DE CONEXIÓN A SUPABASE -->
    <script>
        // CONFIGURACIÓN DE TU CLIENTE SUPABASE
        // Recordá que estas credenciales ya están vinculadas a tu base de datos de BKL
        const SUPABASE_URL = "https://tu-url-de-supabase.supabase.co"; 
        const SUPABASE_KEY = "tu-anon-key-de-supabase"; 
        
        // Reemplazar arriba con tus datos reales si los tenés a mano, 
        // o si ya tenías un bloque de script con las claves puestas, dejalas como estaban.
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function obtenerEstado() {
            try {
                // Consultamos la tabla 'estado_local' (asegurate que se llame así en tu Supabase)
                const { data, error } = await supabase
                    .from('estado_local')
                    .select('estado')
                    .single();

                if (error) throw error;

                actualizarInterfaz(data.estado);
            } catch (err) {
                console.error("Error al conectar con Supabase:", err);
                // Estado por defecto en caso de falla
                actualizarInterfaz("Cerrado");
            }
        }

        function actualizarInterfaz(estado) {
            const card = document.getElementById('status-card');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            // Limpiamos clases previas
            dot.className = "w-3 h-3 rounded-full animate-pulse ";
            card.className = "w-full bg-gray-800 rounded-2xl p-6 mb-8 text-center border shadow-xl transition-all duration-500 transform scale-100 opacity-100 ";

            // Lógica para los 4 estados que me pasaste
            switch(estado) {
                case 'Abierto':
                    text.innerText = "Abierto Ahora";
                    text.className = "text-xl font-bold tracking-wide text-emerald-400";
                    dot.classList.add("bg-emerald-500");
                    card.classList.add("border-emerald-500/30", "shadow-emerald-950/20");
                    break;
                case 'Abierto Ya Volvimos':
                    text.innerText = "Abierto - ¡Ya Volvimos!";
                    text.className = "text-xl font-bold tracking-wide text-emerald-400";
                    dot.classList.add("bg-emerald-500");
                    card.classList.add("border-emerald-500/30", "shadow-emerald-950/20");
                    break;
                case 'Cerrado Ya Volvemos':
                    text.innerText = "Cerrado - Ya Volvemos";
                    text.className = "text-xl font-bold tracking-wide text-amber-400";
                    dot.classList.add("bg-amber-500");
                    card.classList.add("border-amber-500/30", "shadow-amber-950/20");
                    break;
                case 'Cerrado':
                default:
                    text.innerText = "Cerrado en este momento";
                    text.className = "text-xl font-bold tracking-wide text-gray-400";
                    dot.classList.add("bg-gray-500");
                    card.classList.add("border-gray-700", "shadow-black/20");
                    break;
            }
        }

        // Ejecutar al cargar la página
        obtenerEstado();

        // Escuchar cambios en tiempo real desde Supabase para que cambie solo sin recargar la web
        supabase
            .channel('cambios-estado')
            .on('postgres_changes', { event: 'UPDATE', scheme: 'public', table: 'estado_local' }, payload => {
                if(payload.new && payload.new.estado) {
                    actualizarInterfaz(payload.new.estado);
                }
            })
            .subscribe();
    </script>
</body>
</html>
